name: Publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: piskooooo/southjerseyreal.estate
  LEAD_API_IMAGE_NAME: piskooooo/southjerseyreal.estate-lead-api

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: .
            file: ./Dockerfile
            image: piskooooo/southjerseyreal.estate
          - name: lead-api
            context: ./lead-api
            file: ./lead-api/Dockerfile
            image: piskooooo/southjerseyreal.estate-lead-api

    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          build-args: |
            VITE_GA_MEASUREMENT_ID=G-97H86MNHP8
            VITE_SUPABASE_URL=https://sinbxruqlaywvbzcvfli.supabase.co
            VITE_TURNSTILE_SITE_KEY=0x4AAAAAAD4GwgGgH6mUSw5r
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
