name: Test site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit and compliance tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install compliance-test browser
        run: npx playwright install --with-deps chromium

      - name: Run rendered compliance tests
        run: npm run test:compliance
        env:
          VITE_GA_MEASUREMENT_ID: G-TEST123
